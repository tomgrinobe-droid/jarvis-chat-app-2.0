<!DOCTYPE html>
<html>
<head>
    <title>Jarvis Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 100%;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }
        #chat {
            height: 80vh;
            overflow-y: auto;
            padding: 10px;
            background: white;
        }
        .message {
            margin: 8px;
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 80%;
        }
        .user {
            background: #007AFF;
            color: white;
            margin-left: auto;
        }
        .jarvis {
            background: #e5e5ea;
            color: black;
            margin-right: auto;
        }
        #input {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }
        #input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            margin-right: 10px;
        }
        #input button {
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
        }
        #input button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="input">
        <input type="text" id="userInput" placeholder="Type a message...">
        <button onclick="sendMessage()" id="sendButton">Send</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');

        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            messageDiv.classList.add(isUser ? 'user' : 'jarvis');
            messageDiv.textContent = text;
            chat.appendChild(messageDiv);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Disable button and input while loading
            sendButton.disabled = true;
            userInput.disabled = true;

            // Add user message to chat
            addMessage(text, true);
            userInput.value = '';

            try {
                // Your Vercel proxy URL is inserted here
                const response = await fetch('https://jarvis-chat-app-2-0.vercel.app/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: text }],
                    }),
                });

                if (!response.ok) {
                    throw new Error(`Proxy error: ${response.status}`);
                }

                const data = await response.json();
                const jarvisResponse = data.choices[0].message.content;
                addMessage(jarvisResponse, false);
            } catch (error) {
                console.error('Error:', error);
                addMessage(`Sorry, I encountered an error: ${error.message}`, false);
            } finally {
                // Re-enable button and input
                sendButton.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        }

        // Allow sending with Enter key
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
